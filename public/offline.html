<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ዴንብ — Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 1rem;
    padding: 2.5rem 2rem;
    max-width: 380px;
    width: 90%;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .icon {
    font-size: 3.5rem;
    margin-bottom: 1rem;
    display: block;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    font-size: 0.9rem;
    color: #94a3b8;
    margin-bottom: 1.5rem;
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: #ef444422;
    border: 1px solid #ef4444;
    color: #fca5a5;
    padding: 0.4rem 1rem;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
  }
  .dot {
    width: 8px; height: 8px;
    background: #ef4444;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .tips {
    background: #0f172a;
    border-radius: 0.75rem;
    padding: 1rem;
    text-align: left;
    margin-bottom: 1.5rem;
  }
  .tips h3 { font-size: 0.8rem; color: #64748b; margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .tips li { font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.4rem; padding-left: 1rem; position: relative; }
  .tips li::before { content: "→"; position: absolute; left: 0; color: #3b82f6; }
  .btn {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 0.5rem;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }
  .btn:hover { background: #2563eb; }
</style>
</head>
<body>
<div class="card">
  <span class="icon">📡</span>
  <h1>ኔትወርክ አልተገኘም</h1>
  <p class="subtitle">No Internet Connection — You are offline</p>

  <div class="status-badge">
    <div class="dot"></div>
    Offline Mode
  </div>

  <div class="tips">
    <h3>What you can do offline</h3>
    <ul>
      <li>Fill out awareness logs</li>
      <li>Save drafts to your device</li>
      <li>View your Outbox</li>
      <li>Data syncs automatically when signal returns</li>
    </ul>
  </div>

  <button class="btn" onclick="window.history.back()">← Go Back</button>
</div>

<script>
  // Auto-reload when connection restores
  window.addEventListener('online', () => window.location.reload());
</script>
</body>
</html>
